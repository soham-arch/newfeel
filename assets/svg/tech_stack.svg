      .card-bg {
        fill: #030712;
        stroke: #1e293b;
        stroke-width: 1.5;
        rx: 12px;
      }
      .card-header {
        font-family: 'Outfit', system-ui, sans-serif;
        font-size: 14px;
        font-weight: 700;
        fill: #f8fafc;
        letter-spacing: 0.02em;
      }
      .pill-bg {
        fill: #0d1527;
        stroke: #1e293b;
        stroke-width: 1;
        rx: 6px;
      }
      .pill-text {
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 11px;
        font-weight: 500;
        fill: #94a3b8;
      }
      .grid-pattern {
        fill: none;
        stroke: #1e293b;
        stroke-width: 0.5;
        stroke-opacity: 0.15;
      }
    </style>
    
    <pattern id="card-grid" width="20" height="20" patternUnits="userSpaceOnUse">
