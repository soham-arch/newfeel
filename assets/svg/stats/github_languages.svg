<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 200" width="100%" height="100%">
  <defs>
    <style type="text/css">
      
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;900&amp;family=Inter:wght@400;500&amp;family=JetBrains+Mono:wght@700&amp;display=swap');
  
  .card-bg {
    fill: #030712;
    stroke: #1e293b;
    stroke-width: 1.5;
    rx: 12px;
  }
  .header-title {
    font-family: 'Outfit', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 700;
    fill: #f8fafc;
    letter-spacing: 0.02em;
  }
  .label-text {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 12px;
    font-weight: 400;
    fill: #94a3b8;
  }
  .value-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    fill: #f8fafc;
  }
  .grid-pattern {
    fill: none;
    stroke: #1e293b;
    stroke-width: 0.5;
    stroke-opacity: 0.15;
  }

    </style>
    <pattern id="lang-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" class="grid-pattern" />
    </pattern>
  </defs>

  <rect width="100%" height="100%" class="card-bg" />
  <rect width="100%" height="100%" fill="url(#lang-grid)" rx="12" />
  <path d="M 20 0 L 100 0" stroke="#6366f1" stroke-width="2" stroke-linecap="round" />

  <!-- Header -->
  <circle cx="20" cy="30" r="4" fill="#6366f1" />
  <text x="32" y="34" class="header-title">Top Languages</text>

  <!-- Language List -->
  <g transform="translate(25, 62)">
    
    <g transform="translate(0, 0)">
      <!-- Language Name -->
      <text x="0" y="11" class="label-text" font-size="11.5">JavaScript</text>
      
      <!-- Progress Bar Track -->
      <rect x="110" y="2" width="150" height="8" rx="4" fill="#0d1527" stroke="#1e293b" stroke-width="0.5" />
      
      <!-- Progress Bar Fill -->
      <rect x="110" y="2" width="101" height="8" rx="4" fill="#f1e05a" />
      
      <!-- Percentage Text -->
      <text x="270" y="11" class="label-text" font-size="11" fill="#64748b">66.7%</text>
    </g>
    
    <g transform="translate(0, 24)">
      <!-- Language Name -->
      <text x="0" y="11" class="label-text" font-size="11.5">Dart</text>
      
      <!-- Progress Bar Track -->
      <rect x="110" y="2" width="150" height="8" rx="4" fill="#0d1527" stroke="#1e293b" stroke-width="0.5" />
      
      <!-- Progress Bar Fill -->
      <rect x="110" y="2" width="20" height="8" rx="4" fill="#00B4AB" />
      
      <!-- Percentage Text -->
      <text x="270" y="11" class="label-text" font-size="11" fill="#64748b">13.2%</text>
    </g>
    
    <g transform="translate(0, 48)">
      <!-- Language Name -->
      <text x="0" y="11" class="label-text" font-size="11.5">C++</text>
      
      <!-- Progress Bar Track -->
      <rect x="110" y="2" width="150" height="8" rx="4" fill="#0d1527" stroke="#1e293b" stroke-width="0.5" />
      
      <!-- Progress Bar Fill -->
      <rect x="110" y="2" width="12" height="8" rx="4" fill="#f34b7d" />
      
      <!-- Percentage Text -->
      <text x="270" y="11" class="label-text" font-size="11" fill="#64748b">8%</text>
    </g>
    
    <g transform="translate(0, 72)">
      <!-- Language Name -->
      <text x="0" y="11" class="label-text" font-size="11.5">CMake</text>
      
      <!-- Progress Bar Track -->
      <rect x="110" y="2" width="150" height="8" rx="4" fill="#0d1527" stroke="#1e293b" stroke-width="0.5" />
      
      <!-- Progress Bar Fill -->
      <rect x="110" y="2" width="10" height="8" rx="4" fill="#DA3434" />
      
      <!-- Percentage Text -->
      <text x="270" y="11" class="label-text" font-size="11" fill="#64748b">6.3%</text>
    </g>
    
    <g transform="translate(0, 96)">
      <!-- Language Name -->
      <text x="0" y="11" class="label-text" font-size="11.5">CSS</text>
      
      <!-- Progress Bar Track -->
      <rect x="110" y="2" width="150" height="8" rx="4" fill="#0d1527" stroke="#1e293b" stroke-width="0.5" />
      
      <!-- Progress Bar Fill -->
      <rect x="110" y="2" width="6" height="8" rx="4" fill="#663399" />
      
      <!-- Percentage Text -->
      <text x="270" y="11" class="label-text" font-size="11" fill="#64748b">3.4%</text>
    </g>
    
  </g>
</svg>