<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="100%" height="100%">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&amp;family=Inter:wght@400;500&amp;display=swap');
      
      .axis-line {
        stroke: #1e293b;
        stroke-width: 3;
        stroke-linecap: round;
      }
      .axis-active {
        stroke: url(#active-grad);
        stroke-width: 3;
        stroke-linecap: round;
        stroke-dasharray: 8, 12;
        animation: dashMove 30s linear infinite;
      }
      @keyframes dashMove {
        0% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -1000; }
      }
      
      .milestone-title {
        font-family: 'Outfit', system-ui, sans-serif;
        font-size: 11.5px;
        font-weight: 700;
        fill: #f8fafc;
      }
      
      .milestone-detail {
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 9.5px;
        fill: #64748b;
        font-weight: 400;
      }
      
      .node-core {
        fill: #030712;
        stroke-width: 2.5;
      }
      .node-pulse {
        animation: pulseNode 3s ease-in-out infinite alternate;
      }
      @keyframes pulseNode {
        0% { r: 6; fill-opacity: 0.15; }
        100% { r: 12; fill-opacity: 0.4; }
      }
    </style>

    <linearGradient id="active-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>

    <linearGradient id="glow-node-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
  </defs>

  <!-- Background container -->
  <rect width="100%" height="100%" fill="#030712" rx="16" stroke="#1e293b" stroke-width="1.5" />
  
  <!-- Subtle Grid Overlay -->
  <g opacity="0.1">
    <path d="M 0,40 L 800,40 M 0,80 L 800,80 M 0,120 L 800,120" stroke="#1e293b" stroke-width="0.5" />
    <path d="M 100,0 L 100,160 M 200,0 L 200,160 M 300,0 L 300,160 M 400,0 L 400,160 M 500,0 L 500,160 M 600,0 L 600,160 M 700,0 L 700,160" stroke="#1e293b" stroke-width="0.5" />
  </g>

  <!-- Base Timeline Axis Line -->
  <line x1="50" y1="80" x2="750" y2="80" class="axis-line" />
  <line x1="50" y1="80" x2="750" y2="80" class="axis-active" />

  <!-- NODE 1: Started Programming -->
  <g>
    <!-- Node Connection line up/down -->
    <line x1="50" y1="80" x2="50" y2="65" stroke="#1e293b" stroke-width="1.5" />
    
    <!-- Outer Pulse Circle -->
    <circle cx="50" cy="80" r="7" fill="#6366f1" fill-opacity="0.2" class="node-pulse" style="animation-delay: -0.0s;" />
    
    <!-- Core Circle -->
    <circle cx="50" cy="80" r="5" class="node-core" stroke="#6366f1" />
    
    <!-- Labels -->
  
    <text x="50" y="46" class="milestone-title" text-anchor="middle">Started Programming</text>
    <text x="50" y="58" class="milestone-detail" text-anchor="middle">Learned algorithms and core computer science fundamentals.</text>
    
  </g>
  
  <!-- NODE 2: Android Development -->
  <g>
    <!-- Node Connection line up/down -->
    <line x1="150" y1="80" x2="150" y2="95" stroke="#1e293b" stroke-width="1.5" />
    
    <!-- Outer Pulse Circle -->
    <circle cx="150" cy="80" r="7" fill="#6366f1" fill-opacity="0.2" class="node-pulse" style="animation-delay: -0.4s;" />
    
    <!-- Core Circle -->
    <circle cx="150" cy="80" r="5" class="node-core" stroke="#6366f1" />
    
    <!-- Labels -->
  
    <text x="150" y="114" class="milestone-title" text-anchor="middle">Android Development</text>
    <text x="150" y="128" class="milestone-detail" text-anchor="middle">Built native mobile experiences and mobile user interactions.</text>
    
  </g>
  
  <!-- NODE 3: Firebase -->
  <g>
    <!-- Node Connection line up/down -->
    <line x1="250" y1="80" x2="250" y2="65" stroke="#1e293b" stroke-width="1.5" />
    
    <!-- Outer Pulse Circle -->
    <circle cx="250" cy="80" r="7" fill="#6366f1" fill-opacity="0.2" class="node-pulse" style="animation-delay: -0.8s;" />
    
    <!-- Core Circle -->
    <circle cx="250" cy="80" r="5" class="node-core" stroke="#6366f1" />
    
    <!-- Labels -->
  
    <text x="250" y="46" class="milestone-title" text-anchor="middle">Firebase</text>
    <text x="250" y="58" class="milestone-detail" text-anchor="middle">Architected real-time synchronizations and serverless databases.</text>
    
  </g>
  
  <!-- NODE 4: Full Stack -->
  <g>
    <!-- Node Connection line up/down -->
    <line x1="350" y1="80" x2="350" y2="95" stroke="#1e293b" stroke-width="1.5" />
    
    <!-- Outer Pulse Circle -->
    <circle cx="350" cy="80" r="7" fill="#3b82f6" fill-opacity="0.2" class="node-pulse" style="animation-delay: -1.2s;" />
    
    <!-- Core Circle -->
    <circle cx="350" cy="80" r="5" class="node-core" stroke="#3b82f6" />
    
    <!-- Labels -->
  
    <text x="350" y="114" class="milestone-title" text-anchor="middle">Full Stack</text>
    <text x="350" y="128" class="milestone-detail" text-anchor="middle">Developed responsive web architectures and solid REST API backends.</text>
    
  </g>
  
  <!-- NODE 5: AI Projects -->
  <g>
    <!-- Node Connection line up/down -->
    <line x1="450" y1="80" x2="450" y2="65" stroke="#1e293b" stroke-width="1.5" />
    
    <!-- Outer Pulse Circle -->
    <circle cx="450" cy="80" r="7" fill="#3b82f6" fill-opacity="0.2" class="node-pulse" style="animation-delay: -1.6s;" />
    
    <!-- Core Circle -->
    <circle cx="450" cy="80" r="5" class="node-core" stroke="#3b82f6" />
    
    <!-- Labels -->
  
    <text x="450" y="46" class="milestone-title" text-anchor="middle">AI Projects</text>
    <text x="450" y="58" class="milestone-detail" text-anchor="middle">Transitioned to building intelligent products using deep neural networks.</text>
    
  </g>
  
  <!-- NODE 6: Computer Vision -->
  <g>
    <!-- Node Connection line up/down -->
    <line x1="550" y1="80" x2="550" y2="95" stroke="#1e293b" stroke-width="1.5" />
    
    <!-- Outer Pulse Circle -->
    <circle cx="550" cy="80" r="7" fill="#38bdf8" fill-opacity="0.2" class="node-pulse" style="animation-delay: -2.0s;" />
    
    <!-- Core Circle -->
    <circle cx="550" cy="80" r="5" class="node-core" stroke="#38bdf8" />
    
    <!-- Labels -->
  
    <text x="550" y="114" class="milestone-title" text-anchor="middle">Computer Vision</text>
    <text x="550" y="128" class="milestone-detail" text-anchor="middle">Worked with CNNs, face embeddings, and real-time image processing.</text>
    
  </g>
  
  <!-- NODE 7: RAG Architectures -->
  <g>
    <!-- Node Connection line up/down -->
    <line x1="650" y1="80" x2="650" y2="65" stroke="#1e293b" stroke-width="1.5" />
    
    <!-- Outer Pulse Circle -->
    <circle cx="650" cy="80" r="7" fill="#38bdf8" fill-opacity="0.2" class="node-pulse" style="animation-delay: -2.4s;" />
    
    <!-- Core Circle -->
    <circle cx="650" cy="80" r="5" class="node-core" stroke="#38bdf8" />
    
    <!-- Labels -->
  
    <text x="650" y="46" class="milestone-title" text-anchor="middle">RAG Architectures</text>
    <text x="650" y="58" class="milestone-detail" text-anchor="middle">Integrated vector search engines with LLMs to query domain-specific data.</text>
    
  </g>
  
  <!-- NODE 8: Agentic AI -->
  <g>
    <!-- Node Connection line up/down -->
    <line x1="750" y1="80" x2="750" y2="95" stroke="#1e293b" stroke-width="1.5" />
    
    <!-- Outer Pulse Circle -->
    <circle cx="750" cy="80" r="7" fill="#38bdf8" fill-opacity="0.2" class="node-pulse" style="animation-delay: -2.8s;" />
    
    <!-- Core Circle -->
    <circle cx="750" cy="80" r="5" class="node-core" stroke="#38bdf8" />
    
    <!-- Labels -->
  
    <text x="750" y="114" class="milestone-title" text-anchor="middle">Agentic AI</text>
    <text x="750" y="128" class="milestone-detail" text-anchor="middle">Building autonomous, tool-calling multi-agent execution graphs.</text>
    
  </g>
  
</svg>